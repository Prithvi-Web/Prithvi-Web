<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="36" viewBox="0 0 1000 36" role="img" aria-label="">
  <defs>
    <linearGradient id="pulseGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2997ff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#2997ff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#2997ff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="lineClip">
      <rect x="60" y="14" width="880" height="8"/>
    </clipPath>
  </defs>
  <style>
    @keyframes travel{0%{transform:translateX(0)}100%{transform:translateX(1240px)}}
    .tp{animation:travel 4.5s linear infinite}
  </style>
  <rect x="60" y="17.5" width="880" height="1" fill="#8e8e93" fill-opacity="0.3"/>
  <g clip-path="url(#lineClip)">
    <g class="tp">
      <rect x="-240" y="16.5" width="180" height="3" rx="1.5" fill="url(#pulseGrad)"/>
    </g>
  </g>
</svg>
