<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="230" viewBox="0 0 1000 230" role="img" aria-label="By the numbers: 135+ GitHub stars, 10 forks on TreeMap, 3 platforms shipped, 100% hand-built">
  <defs>
    <linearGradient id="metal5" x1="0" y1="0" x2="1" y2="0.25">
      <stop offset="0" stop-color="#f5f5f7"/>
      <stop offset="0.55" stop-color="#c8ccd8"/>
      <stop offset="1" stop-color="#8e93a6"/>
    </linearGradient>
    <radialGradient id="gBlue5" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2b46b8"/>
      <stop offset="1" stop-color="#2b46b8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="frame5">
      <rect width="1000" height="230" rx="28"/>
    </clipPath>
  </defs>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Helvetica,Arial,sans-serif}
    @keyframes twinkle5{0%,100%{opacity:.12}50%{opacity:.8}}
    .st{animation:twinkle5 4.5s ease-in-out infinite}
    @keyframes pulse5{0%,100%{opacity:.3}50%{opacity:.5}}
    .glow{animation:pulse5 8s ease-in-out infinite}
    @keyframes fadeup5{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}
    .tile{opacity:0;animation:fadeup5 .9s cubic-bezier(.25,.1,.25,1) forwards}
    .t1{animation-delay:.2s}.t2{animation-delay:.45s}.t3{animation-delay:.7s}.t4{animation-delay:.95s}
    @keyframes fl5{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
    .fl{animation:fl5 6s ease-in-out infinite}
    @keyframes starp5{0%,100%{opacity:.55}50%{opacity:1}}
    .stp{animation:starp5 2.2s ease-in-out infinite}
    @keyframes sweep5{0%{transform:translateX(0)}55%,100%{transform:translateX(1300px)}}
    .sh{animation:sweep5 6.5s ease-in-out infinite;animation-delay:1.4s}
  </style>
  <g clip-path="url(#frame5)">
    <rect width="1000" height="230" fill="#000000"/>
    <g fill="#ffffff">
      <circle class="st" cx="70" cy="50" r="1.2"/>
      <circle class="st" cx="350" cy="35" r="1" style="animation-delay:-1.7s"/>
      <circle class="st" cx="640" cy="45" r="1.2" style="animation-delay:-3.1s"/>
      <circle class="st" cx="930" cy="60" r="1" style="animation-delay:-.6s"/>
      <circle class="st" cx="180" cy="200" r="1" style="animation-delay:-2.3s"/>
      <circle class="st" cx="820" cy="205" r="1.1" style="animation-delay:-4s"/>
    </g>
    <ellipse class="glow" cx="500" cy="270" rx="400" ry="120" fill="url(#gBlue5)" opacity="0.4"/>
    <text x="500" y="58" text-anchor="middle" font-size="12" font-weight="600" letter-spacing="3" fill="#86868b">BY THE NUMBERS</text>
    <g class="tile t1"><g class="fl">
      <rect x="64" y="88" width="200" height="110" rx="20" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.14"/>
      <text x="150" y="144" text-anchor="middle" font-size="34" font-weight="700" fill="url(#metal5)">135+</text>
      <text class="stp" x="196" y="142" font-size="17" fill="#2997ff">★</text>
      <text x="164" y="174" text-anchor="middle" font-size="13" fill="#86868b">GitHub stars</text>
    </g></g>
    <g class="tile t2"><g class="fl" style="animation-delay:-1.5s">
      <rect x="288" y="88" width="200" height="110" rx="20" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.14"/>
      <text x="388" y="144" text-anchor="middle" font-size="34" font-weight="700" fill="url(#metal5)">10</text>
      <text x="388" y="174" text-anchor="middle" font-size="13" fill="#86868b">forks on TreeMap</text>
    </g></g>
    <g class="tile t3"><g class="fl" style="animation-delay:-3s">
      <rect x="512" y="88" width="200" height="110" rx="20" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.14"/>
      <text x="612" y="144" text-anchor="middle" font-size="34" font-weight="700" fill="url(#metal5)">3</text>
      <text x="612" y="174" text-anchor="middle" font-size="13" fill="#86868b">platforms shipped</text>
    </g></g>
    <g class="tile t4"><g class="fl" style="animation-delay:-4.5s">
      <rect x="736" y="88" width="200" height="110" rx="20" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.14"/>
      <text x="836" y="144" text-anchor="middle" font-size="34" font-weight="700" fill="url(#metal5)">100%</text>
      <text x="836" y="174" text-anchor="middle" font-size="13" fill="#86868b">hand-built code</text>
    </g></g>
    <g clip-path="url(#frame5)">
      <g class="sh">
        <rect x="-180" y="0" width="120" height="230" fill="url(#sheen5)" transform="skewX(-14)"/>
      </g>
    </g>
  </g>
</svg>
