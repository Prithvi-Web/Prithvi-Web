<svg xmlns="http://www.w3.org/2000/svg" width="320" height="72" viewBox="0 0 320 72" role="img" aria-label="Connect on LinkedIn">
  <defs>
    <linearGradient id="shL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="pillL">
      <rect x="1" y="1" width="318" height="70" rx="35"/>
    </clipPath>
  </defs>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Helvetica,Arial,sans-serif}
    @keyframes sweepL{0%{transform:translateX(0)}60%,100%{transform:translateX(480px)}}
    .sh{animation:sweepL 4.2s ease-in-out infinite}
    @keyframes nudgeL{0%,100%{transform:translateX(0)}50%{transform:translateX(4px)}}
    .ar{animation:nudgeL 1.8s ease-in-out infinite}
  </style>
  <rect x="1" y="1" width="318" height="70" rx="35" fill="#000000" stroke="#ffffff" stroke-opacity="0.16"/>
  <rect x="28" y="22" width="28" height="28" rx="7" fill="#0a66c2"/>
  <text x="42" y="42" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">in</text>
  <text x="70" y="42" font-size="15" font-weight="600" fill="#f5f5f7">Connect on LinkedIn</text>
  <g class="ar">
    <text x="272" y="42" font-size="16" fill="#2997ff">→</text>
  </g>
  <g clip-path="url(#pillL)">
    <g class="sh">
      <rect x="-120" y="0" width="80" height="72" fill="url(#shL)" transform="skewX(-14)"/>
    </g>
  </g>
</svg>
