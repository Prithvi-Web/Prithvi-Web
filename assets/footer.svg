<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="180" viewBox="0 0 1000 180" role="img" aria-label="Real products. No shortcuts. — Prithvi Vinay">
  <defs>
    <linearGradient id="metal4" x1="0" y1="0" x2="1" y2="0.25">
      <stop offset="0" stop-color="#f5f5f7"/>
      <stop offset="0.55" stop-color="#c8ccd8"/>
      <stop offset="1" stop-color="#8e93a6"/>
    </linearGradient>
    <radialGradient id="gBlue4" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2b46b8"/>
      <stop offset="1" stop-color="#2b46b8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="topline4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="frame4">
      <rect width="1000" height="180" rx="28"/>
    </clipPath>
  </defs>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Helvetica,Arial,sans-serif}
    @keyframes twinkle4{0%,100%{opacity:.12}50%{opacity:.8}}
    .st{animation:twinkle4 4.2s ease-in-out infinite}
    @keyframes pulse4{0%,100%{opacity:.35}50%{opacity:.6}}
    .glow{animation:pulse4 7s ease-in-out infinite}
    @keyframes sweep4{0%{transform:translateX(0)}55%,100%{transform:translateX(1300px)}}
    .sh{animation:sweep4 7s ease-in-out infinite}
  </style>
  <g clip-path="url(#frame4)">
    <rect width="1000" height="180" fill="#000000"/>
    <rect x="200" y="0" width="600" height="1" fill="url(#topline4)"/>
    <g fill="#ffffff">
      <circle class="st" cx="120" cy="60" r="1.2"/>
      <circle class="st" cx="300" cy="130" r="1" style="animation-delay:-1.5s"/>
      <circle class="st" cx="720" cy="140" r="1.1" style="animation-delay:-2.7s"/>
      <circle class="st" cx="880" cy="55" r="1.2" style="animation-delay:-.8s"/>
      <circle class="st" cx="950" cy="120" r="1" style="animation-delay:-3.5s"/>
      <circle class="st" cx="60" cy="140" r="1" style="animation-delay:-2s"/>
    </g>
    <ellipse class="glow" cx="500" cy="210" rx="340" ry="110" fill="url(#gBlue4)" opacity="0.45"/>
    <text x="500" y="84" text-anchor="middle" font-size="21" font-weight="600" fill="url(#metal4)" letter-spacing="0.3">"Real products. No shortcuts."</text>
    <text x="500" y="126" text-anchor="middle" font-size="13" fill="#6e6e73">© 2026 Prithvi Vinay — handcrafted, like everything else here.</text>
    <g clip-path="url(#frame4)">
      <g class="sh">
        <rect x="-160" y="0" width="110" height="180" fill="url(#sheen4)" transform="skewX(-14)"/>
      </g>
    </g>
  </g>
</svg>
